<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
.app{max-width:640px;margin:0 auto;padding:20px 16px 60px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.scoreboard{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:14px;border:1px solid #e8e8e8}
.sb-player{text-align:center}
.sb-name{font-size:12px;color:#888;margin-bottom:4px}
.sb-pts{font-size:32px;font-weight:700;color:#1a1a1a}
.sb-pts.lead{color:#16a34a}
.sb-sub{font-size:11px;color:#bbb;margin-top:2px}
.sb-vs{display:flex;align-items:center;font-size:12px;color:#bbb}
.scoring-note{font-size:12px;color:#666;background:#f9f9f9;border-radius:8px;padding:8px 12px;margin-bottom:14px;border:1px solid #eee}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.ftab{padding:5px 12px;border-radius:20px;border:1px solid #ddd;font-size:13px;cursor:pointer;background:transparent;color:#666}
.ftab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.match{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.match-meta{font-size:12px;color:#888}
.badge{font-size:11px;padding:2px 10px;border-radius:20px;font-weight:500}
.badge-done{background:#dcfce7;color:#16a34a}
.badge-upcoming{background:#fef9c3;color:#a16207}
.teams-row{display:grid;grid-template-columns:1fr 48px 1fr;align-items:center;gap:4px;margin-bottom:12px}
.team-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.flag{font-size:20px}
.tname{font-size:13px;font-weight:600;text-align:center;word-break:break-word}
.score-box{text-align:center}
.score-final{font-size:20px;font-weight:700}
.score-pending{font-size:12px;color:#bbb}
.preds{display:grid;grid-template-columns:1fr 1fr;gap:8px;border-top:1px solid #f0f0f0;padding-top:10px}
.pred-card{background:#f9f9f9;border-radius:8px;padding:8px 10px;min-width:0}
.pred-label{font-size:11px;color:#888;margin-bottom:4px;font-weight:600}
.pred-val{font-size:13px;font-weight:600;color:#1a1a1a;word-break:break-word}
.pred-val.ok{color:#16a34a}
.pred-val.no{color:#dc2626}
.pts-tag{display:inline-block;margin-top:3px;font-size:11px;padding:1px 8px;border-radius:20px;background:#dbeafe;color:#1d4ed8}
.no-pred{font-size:13px;color:#bbb;font-style:italic}
.action-row{border-top:1px solid #f0f0f0;padding-top:10px;margin-top:2px}
.action-row-top{display:flex;gap:6px;margin-bottom:6px}
.action-row-top .btn-enter,.action-row-top .btn{flex:1;text-align:center}
.action-row-bottom{display:flex;justify-content:flex-end}
.btn-enter{padding:7px 12px;border-radius:8px;border:1px solid #f97316;background:#f97316;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.btn-enter:hover{background:#ea6c0a}
.btn{padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:transparent;color:#1a1a1a;font-size:13px;cursor:pointer;font-weight:500}
.btn:hover{background:#f5f5f5}
.btn-cancel{color:#888;border-color:#eee}
.btn-danger{color:#dc2626;border-color:#fecaca}
.btn-danger:hover{background:#fff5f5}
.edit-section{border-top:1px solid #f0f0f0;padding-top:10px;margin-top:2px}
.edit-label{font-size:12px;color:#888;margin-bottom:8px;font-weight:500}
.result-inputs{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.result-inputs span{font-size:12px;color:#666}
.small-input{width:44px;text-align:center;padding:5px;font-size:15px;border:1px solid #ddd;border-radius:8px;background:#fff}
.dash{color:#888;font-weight:600}
.pred-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pred-form-card{background:#f9f9f9;border-radius:8px;padding:8px 10px;min-width:0}
.pred-form-label{font-size:11px;color:#888;margin-bottom:6px;font-weight:600}
.pred-sel{font-size:12px;padding:4px 6px;border:1px solid #ddd;border-radius:6px;background:#fff;width:100%;margin-bottom:6px}
.score-inputs{display:flex;align-items:center;gap:5px}
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:1px dashed #ccc;border-radius:12px;background:transparent;color:#888;font-size:14px;cursor:pointer;margin-top:4px}
.btn-add:hover{background:#f9f9f9}
.add-form{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:14px 16px;margin-top:10px;margin-bottom:10px}
.add-form h3{font-size:15px;font-weight:600;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:12px;color:#666;font-weight:500}
.form-field input,.form-field select{font-size:13px;padding:7px 9px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;width:100%}
.form-field input[type="date"]{cursor:pointer}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-primary{padding:7px 18px;border-radius:8px;border:none;background:#1a1a1a;color:#fff;font-size:13px;cursor:pointer;font-weight:500}
.btn-primary:hover{background:#333}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.pred-tab-row{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.pred-tab{padding:4px 12px;border-radius:20px;border:1px solid #ddd;font-size:12px;cursor:pointer;background:transparent;color:#666}
.pred-tab.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
@media(max-width:400px){
  .ftab{font-size:12px;padding:4px 10px}
  .tname{font-size:12px}
  .score-final{font-size:18px}
  .form-row{grid-template-columns:1fr}
  .pred-form-grid{grid-template-columns:1fr}
  .preds{grid-template-columns:1fr}
  .sb-pts{font-size:26px}
}
</style>
</head>
<body>
<div class="app">
  <h1 style="text-align:center">вљЅ FIFA World Cup 2026</h1>
  <p class="sub" style="text-align:center">Yuwen vs David</p>
  <div class="scoreboard">
    <div class="sb-player"><div class="sb-name">Yuwen</div><div class="sb-pts" id="pts-yuwen">вЂ“</div><div class="sb-sub">points</div></div>
    <div class="sb-vs">vs</div>
    <div class="sb-player"><div class="sb-name">David</div><div class="sb-pts" id="pts-david">вЂ“</div><div class="sb-sub">points</div></div>
  </div>
  <div class="scoring-note">вњ“ Correct winner / draw: <strong>+3 pts</strong> &nbsp;В·&nbsp; вњ“вњ“ Exact score: <strong>+5 pts</strong></div>
  <div class="filter-row">
    <button class="ftab on" onclick="setFilter('all',this)">All</button>
    <button class="ftab" onclick="setFilter('upcoming',this)">Upcoming</button>
    <button class="ftab" onclick="setFilter('done',this)">Finished</button>
    <button class="ftab" id="sort-btn" onclick="toggleSort()" style="margin-left:auto">рџ•ђ Soonest first</button>
  </div>
  <div id="match-list"><div class="loading">Loading matches...</div></div>
  <button class="btn-add" onclick="toggleAddForm()">пј‹ Add match</button>
  <div id="add-form-area"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = 'https://script.google.com/macros/s/AKfycbzWWvOGCHxchv0DzEcFNDMp5NW94wpMn9znaPewC1--72e_9fUCUCA32dYISG3bLcGS/exec';

const TEAMS = [
  {flag:'рџ‡¦рџ‡±',name:'Albania'},{flag:'рџ‡©рџ‡ї',name:'Algeria'},{flag:'рџ‡¦рџ‡ґ',name:'Angola'},
  {flag:'рџ‡¦рџ‡·',name:'Argentina'},{flag:'рџ‡¦рџ‡І',name:'Armenia'},{flag:'рџ‡¦рџ‡є',name:'Australia'},
  {flag:'рџ‡¦рџ‡№',name:'Austria'},{flag:'рџ‡§рџ‡Є',name:'Belgium'},{flag:'рџ‡§рџ‡ґ',name:'Bolivia'},
  {flag:'рџ‡§рџ‡¦',name:'Bosnia'},{flag:'рџ‡§рџ‡·',name:'Brazil'},{flag:'рџ‡§рџ‡«',name:'Burkina Faso'},
  {flag:'рџ‡Ёрџ‡І',name:'Cameroon'},{flag:'рџ‡Ёрџ‡¦',name:'Canada'},{flag:'рџ‡Ёрџ‡±',name:'Chile'},
  {flag:'рџ‡Ёрџ‡і',name:'China'},{flag:'рџ‡Ёрџ‡ґ',name:'Colombia'},{flag:'рџ‡Ёрџ‡·',name:'Costa Rica'},
  {flag:'рџ‡­рџ‡·',name:'Croatia'},{flag:'рџ‡Ёрџ‡ї',name:'Czech Republic'},{flag:'рџ‡©рџ‡°',name:'Denmark'},
  {flag:'рџ‡Єрџ‡Ё',name:'Ecuador'},{flag:'рџ‡Єрџ‡¬',name:'Egypt'},{flag:'рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї',name:'England'},
  {flag:'рџ‡«рџ‡·',name:'France'},{flag:'рџ‡¬рџ‡­',name:'Ghana'},{flag:'рџ‡©рџ‡Є',name:'Germany'},
  {flag:'рџ‡¬рџ‡·',name:'Greece'},{flag:'рџ‡¬рџ‡№',name:'Guatemala'},{flag:'рџ‡­рџ‡і',name:'Honduras'},
  {flag:'рџ‡­рџ‡є',name:'Hungary'},{flag:'рџ‡®рџ‡·',name:'Iran'},{flag:'рџ‡®рџ‡¶',name:'Iraq'},
  {flag:'рџ‡®рџ‡№',name:'Italy'},{flag:'рџ‡Ёрџ‡®',name:'Ivory Coast'},{flag:'рџ‡Їрџ‡І',name:'Jamaica'},
  {flag:'рџ‡Їрџ‡µ',name:'Japan'},{flag:'рџ‡Їрџ‡ґ',name:'Jordan'},{flag:'рџ‡°рџ‡Є',name:'Kenya'},
  {flag:'рџ‡°рџ‡·',name:'South Korea'},{flag:'рџ‡Ірџ‡±',name:'Mali'},{flag:'рџ‡Ірџ‡¦',name:'Morocco'},
  {flag:'рџ‡Ірџ‡Ѕ',name:'Mexico'},{flag:'рџ‡ірџ‡±',name:'Netherlands'},{flag:'рџ‡ірџ‡ї',name:'New Zealand'},
  {flag:'рџ‡ірџ‡¬',name:'Nigeria'},{flag:'рџ‡ірџ‡ґ',name:'Norway'},{flag:'рџ‡µрџ‡¦',name:'Panama'},
  {flag:'рџ‡µрџ‡ѕ',name:'Paraguay'},{flag:'рџ‡µрџ‡Є',name:'Peru'},{flag:'рџ‡µрџ‡±',name:'Poland'},
  {flag:'рџ‡µрџ‡№',name:'Portugal'},{flag:'рџ‡¶рџ‡¦',name:'Qatar'},{flag:'рџ‡·рџ‡ґ',name:'Romania'},
  {flag:'рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї',name:'Scotland'},{flag:'рџ‡ёрџ‡і',name:'Senegal'},{flag:'рџ‡·рџ‡ё',name:'Serbia'},
  {flag:'рџ‡ёрџ‡°',name:'Slovakia'},{flag:'рџ‡їрџ‡¦',name:'South Africa'},{flag:'рџ‡Єрџ‡ё',name:'Spain'},
  {flag:'рџ‡ёрџ‡Є',name:'Sweden'},{flag:'рџ‡Ёрџ‡­',name:'Switzerland'},{flag:'рџ‡№рџ‡і',name:'Tunisia'},
  {flag:'рџ‡№рџ‡·',name:'Turkey'},{flag:'рџ‡єрџ‡¦',name:'Ukraine'},{flag:'рџ‡¦рџ‡Є',name:'UAE'},
  {flag:'рџ‡єрџ‡ё',name:'USA'},{flag:'рџ‡єрџ‡ѕ',name:'Uruguay'},{flag:'рџ‡»рџ‡Є',name:'Venezuela'},
  {flag:'рџЏґу Ѓ§у Ѓўу Ѓ·у Ѓ¬у Ѓіу Ѓї',name:'Wales'},{flag:'рџ‡їрџ‡І',name:'Zambia'},{flag:'рџ‡їрџ‡ј',name:'Zimbabwe'},
  {flag:'рџ‡­рџ‡№',name:'Haiti'},{flag:'рџ‡Ёрџ‡ј',name:'CuraГ§ao'},
  {flag:'рџ‡Ёрџ‡»',name:'Cape Verde'},{flag:'рџ‡ёрџ‡¦',name:'Saudi Arabia'},
  {flag:'рџ‡Ёрџ‡©',name:'Congo DR'},{flag:'рџ‡єрџ‡ї',name:'Uzbekistan'}
];

let matches=[], filter='all', showAdd=false, editResult=null, editPred=null, predPlayer='both', sortAsc=true;

async function apiFetch(params){
  const url=API+'?'+new URLSearchParams(params);
  const res=await fetch(url);
  return res.json();
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

async function loadMatches(){
  try{
    const data=await apiFetch({action:'getMatches'});
    matches=(data||[]).map(r=>({
      id:String(r.id),group:r.group,date:r.date,
      t1:{flag:r.t1flag,name:r.t1name},
      t2:{flag:r.t2flag,name:r.t2name},
      result:(r.result_s1!==''&&r.result_s1!==null&&r.result_s1!==undefined)
        ?{s1:Number(r.result_s1),s2:Number(r.result_s2)}:null,
      yuwen:r.yuwen_winner?{winner:r.yuwen_winner,s1:Number(r.yuwen_s1),s2:Number(r.yuwen_s2)}:null,
      david:r.david_winner?{winner:r.david_winner,s1:Number(r.david_s1),s2:Number(r.david_s2)}:null
    }));
    render();
  }catch(e){
    document.getElementById('match-list').innerHTML='<div class="loading">вќЊ Failed to load. Check API URL.</div>';
  }
}

function getWinner(s1,s2,t1,t2){return s1>s2?t1:s2>s1?t2:'Draw'}

function calcPts(match){
  if(!match.result)return{yuwen:null,david:null};
  const rw=getWinner(match.result.s1,match.result.s2,match.t1.name,match.t2.name);
  const calc=pred=>{
    if(!pred)return null;
    if(pred.winner===rw&&pred.s1===match.result.s1&&pred.s2===match.result.s2)return 5;
    if(pred.winner===rw)return 3;
    return 0;
  };
  return{yuwen:calc(match.yuwen),david:calc(match.david)};
}

function totalPts(){
  let y=0,d=0;
  matches.forEach(m=>{
    const p=calcPts(m);
    if(p.yuwen!==null)y+=p.yuwen;
    if(p.david!==null)d+=p.david;
  });
  return{yuwen:y,david:d};
}

function renderScoreboard(){
  const{yuwen,david}=totalPts();
  document.getElementById('pts-yuwen').textContent=yuwen;
  document.getElementById('pts-david').textContent=david;
  document.getElementById('pts-yuwen').className='sb-pts'+(yuwen>=david?' lead':'');
  document.getElementById('pts-david').className='sb-pts'+(david>yuwen?' lead':'');
}

function predHtml(pred,match,pts){
  if(!pred)return'<div class="no-pred">No prediction yet</div>';
  const done=match.result!==null;
  let cls='',tag='';
  if(done&&pts!==null){
    cls=pts>0?'ok':'no';
    tag=`<span class="pts-tag">+${pts} pts${pts===5?' (exact!)':''}</span>`;
  }
  const label=pred.winner==='Draw'?`Draw ${pred.s1}вЂ“${pred.s2}`:`${pred.winner} ${pred.s1}вЂ“${pred.s2}`;
  return`<div class="pred-val ${cls}">${label}</div>${tag}`;
}

function predFormCard(match,player){
  const pred=match[player];
  const pname=player==='yuwen'?'Yuwen':'David';
  const opts=`
    <option value="${match.t1.name}"${(!pred||pred.winner===match.t1.name)?' selected':''}>
      ${match.t1.flag} ${match.t1.name}</option>
    <option value="Draw"${pred&&pred.winner==='Draw'?' selected':''}>Draw</option>
    <option value="${match.t2.name}"${pred&&pred.winner===match.t2.name?' selected':''}>
      ${match.t2.flag} ${match.t2.name}</option>`;
  const s1=pred?pred.s1:0,s2=pred?pred.s2:0;
  return`<div class="pred-form-card">
    <div class="pred-form-label">${pname}</div>
    <select class="pred-sel" id="pw-${match.id}-${player}">${opts}</select>
    <div class="score-inputs">
      <input type="number" class="small-input" id="ps1-${match.id}-${player}" value="${s1}" min="0" max="20">
      <span class="dash">вЂ“</span>
      <input type="number" class="small-input" id="ps2-${match.id}-${player}" value="${s2}" min="0" max="20">
    </div></div>`;
}

function matchHtml(match){
  const pts=calcPts(match);
  const done=match.result!==null;
  const isEditR=editResult===match.id;
  const isEditP=editPred===match.id;

  const teamsRow=`<div class="teams-row">
    <div class="team-cell"><span class="flag">${match.t1.flag}</span><span class="tname">${match.t1.name}</span></div>
    <div class="score-box">${done
      ?`<span class="score-final">${match.result.s1} вЂ“ ${match.result.s2}</span>`
      :`<span class="score-pending">vs</span>`}</div>
    <div class="team-cell"><span class="flag">${match.t2.flag}</span><span class="tname">${match.t2.name}</span></div>
  </div>`;

  const predsDisplay=`<div class="preds">
    <div class="pred-card"><div class="pred-label">Yuwen</div>${predHtml(match.yuwen,match,pts.yuwen)}</div>
    <div class="pred-card"><div class="pred-label">David</div>${predHtml(match.david,match,pts.david)}</div>
  </div>`;

  const resultEdit=isEditR?`<div class="edit-section">
    <div class="edit-label">Enter result</div>
    <div class="result-inputs">
      <span>${match.t1.name}</span>
      <input type="number" class="small-input" id="rs1-${match.id}" value="${match.result?match.result.s1:0}" min="0" max="20">
      <span class="dash">вЂ“</span>
      <input type="number" class="small-input" id="rs2-${match.id}" value="${match.result?match.result.s2:0}" min="0" max="20">
      <span>${match.t2.name}</span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-primary" onclick="saveResult('${match.id}')">Save result</button>
      <button class="btn btn-cancel" onclick="editResult=null;render()">Cancel</button>
    </div></div>`:'';

  const predEdit=isEditP?`<div class="edit-section">
    <div class="edit-label">Edit predictions</div>
    <div class="pred-tab-row">
      <button class="pred-tab ${predPlayer==='both'?'on':''}" onclick="predPlayer='both';render()">Both</button>
      <button class="pred-tab ${predPlayer==='yuwen'?'on':''}" onclick="predPlayer='yuwen';render()">Yuwen only</button>
      <button class="pred-tab ${predPlayer==='david'?'on':''}" onclick="predPlayer='david';render()">David only</button>
    </div>
    <div class="pred-form-grid">
      ${predPlayer!=='david'?predFormCard(match,'yuwen'):''}
      ${predPlayer!=='yuwen'?predFormCard(match,'david'):''}
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-primary" onclick="savePreds('${match.id}')">Save predictions</button>
      <button class="btn btn-cancel" onclick="editPred=null;render()">Cancel</button>
    </div></div>`:'';

  const actionRow=!isEditR&&!isEditP?`<div class="action-row">
    <div class="action-row-top">
      <button class="btn-enter" onclick="editResult='${match.id}';editPred=null;render()">${done?'вњЏпёЏ Edit result':'вњЏпёЏ Enter result'}</button>
      <button class="btn" onclick="editPred='${match.id}';editResult=null;predPlayer='both';render()">рџ“ќ Edit predictions</button>
    </div>
    <div class="action-row-bottom">
      <button class="btn btn-danger" onclick="deleteMatch('${match.id}')">рџ—‘ Delete</button>
    </div>
  </div>`:'';

  return`<div class="match">
    <div class="match-top">
      <span class="match-meta">${match.group} В· ${match.date}</span>
      <span class="badge ${done?'badge-done':'badge-upcoming'}">${done?'Finished':'Upcoming'}</span>
    </div>
    ${teamsRow}
    ${!isEditP?predsDisplay:''}
    ${resultEdit}${predEdit}${actionRow}
  </div>`;
}

function render(){
  renderScoreboard();
  let filtered=matches;
  if(filter==='upcoming')filtered=filtered.filter(m=>!m.result);
  if(filter==='done')filtered=filtered.filter(m=>m.result);
  filtered=[...filtered].sort((a,b)=>{
    const parse=s=>{
      try{
        const parts=s.replace('В·','').trim().split(/\s+/);
        const day=parts[0], mon=parts[1], time=(parts[2]||'00:00').split(':');
        return new Date(`${mon} ${day} 2026 ${time[0]}:${time[1]}`);
      }catch(e){return new Date(0);}
    };
    const da=parse(a.date), db=parse(b.date);
    return sortAsc?(da-db):(db-da);
  });
  document.getElementById('match-list').innerHTML=filtered.length
    ?filtered.map(matchHtml).join('')
    :'<div class="loading">No matches yet. Add one below!</div>';
  document.getElementById('add-form-area').innerHTML=showAdd?addFormHtml():'';
}

function setFilter(f,el){
  filter=f;
  document.querySelectorAll('.ftab:not(#sort-btn)').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');render();
}

function toggleSort(){
  sortAsc=!sortAsc;
  const btn=document.getElementById('sort-btn');
  btn.textContent=sortAsc?'рџ•ђ Soonest first':'рџ•ђ Latest first';
  render();
}

function toggleAddForm(){showAdd=!showAdd;render();}

function addFormHtml(){
  const topts=TEAMS.map(t=>`<option value="${t.flag} ${t.name}">`).join('');
  const tdl=`<datalist id="teams-dl">${topts}</datalist>`;
  return`<div class="add-form">
    <h3>вћ• Add new match</h3>
    <div class="form-row">
      <div class="form-field"><label>Group / Round</label>
        <input type="text" id="af-group" placeholder="e.g. Group A, QF"></div>
      <div class="form-field"><label>Date & Time</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="date" id="af-date" style="flex:1">
          <select id="af-hour" style="width:80px;font-size:13px;padding:7px 6px;border:1px solid #ddd;border-radius:8px;background:#fff">
            ${Array.from({length:24},(_,i)=>`<option value="${i}"${i===20?' selected':''}>${String(i).padStart(2,'0')}:00</option>`).join('')}
          </select>
        </div></div>
    </div>
    <div class="form-row">
      ${tdl}
      <div class="form-field"><label>Team 1</label><input id="af-t1" list="teams-dl" placeholder="Search team..." autocomplete="off" style="font-size:13px;padding:7px 9px;border:1px solid #ddd;border-radius:8px;width:100%"></div>
      <div class="form-field"><label>Team 2</label><input id="af-t2" list="teams-dl" placeholder="Search team..." autocomplete="off" style="font-size:13px;padding:7px 9px;border:1px solid #ddd;border-radius:8px;width:100%"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addMatch()">Add match</button>
      <button class="btn btn-cancel" onclick="toggleAddForm()">Cancel</button>
    </div></div>`;
}

async function addMatch(){
  const group=document.getElementById('af-group').value.trim()||'Group';
  const dateRaw=document.getElementById('af-date').value;
  if(!dateRaw){showToast('Please pick a date');return;}
  const hour=document.getElementById('af-hour').value;
  const d=new Date(dateRaw+'T00:00:00');
  const date=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})
    +' В· '+String(hour).padStart(2,'0')+':00';
  const t1raw=document.getElementById('af-t1').value.trim();
  const t2raw=document.getElementById('af-t2').value.trim();
  const findTeam=raw=>TEAMS.find(t=>raw===t.flag+' '+t.name||raw.toLowerCase()===t.name.toLowerCase());
  const t1=findTeam(t1raw), t2=findTeam(t2raw);
  if(!t1||!t2){showToast('Please pick valid teams from the list');return;}
  if(t1.name===t2.name){showToast('Pick two different teams!');return;}
  showToast('Saving...');
  try{
    const res=await apiFetch({
      action:'addMatch',group,date,
      t1flag:t1.flag,t1name:t1.name,
      t2flag:t2.flag,t2name:t2.name
    });
    if(res.success){
      showAdd=false;
      showToast('вњ… Match added!');
      await loadMatches();
    } else {
      showToast('вќЊ Error: '+(res.error||'unknown'));
    }
  }catch(e){showToast('вќЊ Network error');}
}

async function saveResult(id){
  const s1=parseInt(document.getElementById(`rs1-${id}`).value)||0;
  const s2=parseInt(document.getElementById(`rs2-${id}`).value)||0;
  showToast('Saving...');
  try{
    const res=await apiFetch({action:'updateResult',id,s1,s2});
    if(res.success){editResult=null;showToast('вњ… Result saved!');await loadMatches();}
    else showToast('вќЊ Error: '+(res.error||'unknown'));
  }catch(e){showToast('вќЊ Network error');}
}

async function savePreds(id){
  const match=matches.find(m=>m.id===id);
  const get=player=>({
    winner:document.getElementById(`pw-${id}-${player}`).value,
    s1:parseInt(document.getElementById(`ps1-${id}-${player}`).value)||0,
    s2:parseInt(document.getElementById(`ps2-${id}-${player}`).value)||0
  });

  const validate=(pred,pname)=>{
    const{winner,s1,s2}=pred;
    if(winner===match.t1.name&&s1<=s2)
      return`${pname}: if ${match.t1.name} wins, their score must be higher!`;
    if(winner===match.t2.name&&s2<=s1)
      return`${pname}: if ${match.t2.name} wins, their score must be higher!`;
    if(winner==='Draw'&&s1!==s2)
      return`${pname}: draw means both scores must be equal!`;
    return null;
  };

  const toSave=[];
  if(predPlayer!=='david') toSave.push({player:'yuwen',pred:get('yuwen')});
  if(predPlayer!=='yuwen') toSave.push({player:'david',pred:get('david')});

  for(const{player,pred}of toSave){
    const err=validate(pred,player==='yuwen'?'Yuwen':'David');
    if(err){showToast('вќЊ '+err);return;}
  }

  showToast('Saving...');
  try{
    await Promise.all(toSave.map(({player,pred})=>
      apiFetch({action:'updatePrediction',id,player,winner:pred.winner,s1:pred.s1,s2:pred.s2})
    ));
    editPred=null;showToast('вњ… Predictions saved!');await loadMatches();
  }catch(e){showToast('вќЊ Network error');}
}

async function deleteMatch(id){
  if(!confirm('Delete this match?'))return;
  showToast('Deleting...');
  try{
    const res=await apiFetch({action:'deleteMatch',id});
    if(res.success){showToast('рџ—‘ Match deleted');await loadMatches();}
    else showToast('вќЊ Error: '+(res.error||'unknown'));
  }catch(e){showToast('вќЊ Network error');}
}

loadMatches();
